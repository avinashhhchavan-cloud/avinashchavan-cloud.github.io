<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav>
  <h2>MyPortfolio</h2>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#certificates">Certificates</a></li>
  </ul>
</nav>

<!-- Hero -->
<section id="home" class="hero">
  <h1>Hello, I'm <span>Your Name</span></h1>
  <p>Aspiring Developer</p>
  <button onclick="scrollToSection('certificates')">View My Work</button>
</section>

<!-- About -->
<section id="about" class="about">
  <h2>About Me</h2>
  <p>
    I am a passionate learner who loves building websites and learning new technologies.
  </p>
</section>

<!-- Certificates -->
<section id="certificates" class="certificates">
  <h2>My Certificates</h2>

  <div class="cards">

    <div class="card">
      <img src="images/cert1.jpg">
      <h3>Web Development</h3>
    </div>

    <div class="card">
      <img src="images/cert2.jpg">
      <h3>Python Programming</h3>
    </div>

    <div class="card">
      <img src="images/cert3.jpg">
      <h3>Data Science</h3>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

<script src="script.js"></script>
</body>
</html>
