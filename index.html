<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <h2>MyPortfolio</h2>
  <div>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<section class="hero">
  <h1>Hello, I'm <span>Your Name</span></h1>
  <p>Frontend Developer | Student</p>
  <button onclick="scrollToSection('certificates')">View Certificates</button>
</section>

<section class="about">
  <h2>About Me</h2>
  <p>I love building modern websites and learning new tech.</p>
</section>

<section class="skills">
  <h2>Skills</h2>
  <div class="skill-box">
    <span>HTML</span>
    <span>CSS</span>
    <span>JavaScript</span>
  </div>
</section>

<section id="certificates" class="certificates">
  <h2>Certificates</h2>

  <div class="cards">
    <img src="images/cert1.jpg" onclick="openModal(this.src)">
    <img src="images/cert2.jpg" onclick="openModal(this.src)">
    <img src="images/cert3.jpg" onclick="openModal(this.src)">
  </div>
</section>

<section class="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<!-- Modal -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<footer>
  <p>© 2026 Your Name</p>
</footer>

<script src="script.js"></script>
</body>
</html>
